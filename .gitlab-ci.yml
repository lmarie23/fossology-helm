# GitLab CI/CD Pipeline for FOSSology Helm Chart
# Uses tobecontinuous template for Helm chart release and private registry push

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  # Helm configuration
  HELM_VERSION: "3.14.0"
  CHART_NAME: "fossology"
  CHART_VERSION: "1.0.0"
  
  # Registry configuration (set these in GitLab CI/CD variables)
  HELM_REGISTRY_URL: "${CI_REGISTRY_URL}"
  HELM_REGISTRY_USER: "${CI_REGISTRY_USER}"
  HELM_REGISTRY_PASSWORD: "${CI_REGISTRY_PASSWORD}"
  
  # Chart testing configuration
  CT_VERSION: "3.10.1"
  KUBECTL_VERSION: "1.29.0"
  KIND_VERSION: "0.20.0"
  
  # Docker configuration
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

stages:
  - validate
  - test
  - security
  - package
  - release
  - deploy

# Cache for dependencies
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .helm/
    - .cache/

# Install Helm
.install_helm: &install_helm
  - curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
  - chmod 700 get_helm.sh
  - ./get_helm.sh --version v${HELM_VERSION}
  - helm version

# Install chart-testing
.install_ct: &install_ct
  - curl -Lo ct.tar.gz "https://github.com/helm/chart-testing/releases/download/v${CT_VERSION}/chart-testing_${CT_VERSION}_linux_amd64.tar.gz"
  - tar -xzf ct.tar.gz
  - mv ct /usr/local/bin/ct
  - ct version

# Install kubectl
.install_kubectl: &install_kubectl
  - curl -LO "https://dl.k8s.io/release/v${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
  - chmod +x kubectl
  - mv kubectl /usr/local/bin/kubectl
  - kubectl version --client

# Helm Chart Validation
helm:lint:
  stage: validate
  image: alpine:3.19
  before_script:
    - apk add --no-cache curl bash
    - *install_helm
  script:
    - helm lint .
    - helm template ${CHART_NAME} . --debug --dry-run
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# Chart Testing - Lint and Validate
ct:lint:
  stage: validate
  image: quay.io/helmpack/chart-testing:v${CT_VERSION}
  before_script:
    - *install_helm
  script:
    - ct lint --config .github/ct.yaml --chart-dirs . --charts .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# Kubernetes Integration Tests
ct:install:
  stage: test
  image: quay.io/helmpack/chart-testing:v${CT_VERSION}
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "/certs/client"
  before_script:
    - apk add --no-cache docker-cli
    - *install_helm
    - *install_kubectl
    # Install kind
    - curl -Lo ./kind "https://kind.sigs.k8s.io/dl/v${KIND_VERSION}/kind-linux-amd64"
    - chmod +x ./kind
    - mv ./kind /usr/local/bin/kind
    # Create kind cluster
    - kind create cluster --wait 300s
    - kubectl cluster-info
  script:
    - ct install --config .github/ct.yaml --chart-dirs . --charts .
  after_script:
    - kind delete cluster || true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: true

# Security scanning
helm:security:
  stage: security
  image: alpine:3.19
  before_script:
    - apk add --no-cache curl bash
    - *install_helm
  script:
    # Check for security issues in templates
    - helm template ${CHART_NAME} . > rendered-templates.yaml
    # Basic security checks
    - |
      if grep -q "privileged.*true" rendered-templates.yaml; then
        echo "WARNING: Privileged containers detected"
        exit 1
      fi
    - |
      if grep -q "runAsUser.*0" rendered-templates.yaml; then
        echo "WARNING: Running as root user detected"
        exit 1
      fi
  artifacts:
    reports:
      junit: security-report.xml
    paths:
      - rendered-templates.yaml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# Package Helm Chart
helm:package:
  stage: package
  image: alpine:3.19
  before_script:
    - apk add --no-cache curl bash
    - *install_helm
  script:
    # Update dependencies
    - helm dependency update
    # Package the chart
    - helm package . --destination ./packages/
    # Generate index
    - helm repo index ./packages/ --url ${HELM_REGISTRY_URL}
  artifacts:
    paths:
      - packages/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# Release to Private Registry (OCI)
helm:release:oci:
  stage: release
  image: alpine:3.19
  dependencies:
    - helm:package
  before_script:
    - apk add --no-cache curl bash
    - *install_helm
  script:
    # Login to registry
    - echo "${HELM_REGISTRY_PASSWORD}" | helm registry login ${HELM_REGISTRY_URL} --username ${HELM_REGISTRY_USER} --password-stdin
    # Push chart to OCI registry
    - |
      for chart in packages/*.tgz; do
        if [ -f "$chart" ]; then
          echo "Pushing $chart to OCI registry..."
          helm push "$chart" oci://${HELM_REGISTRY_URL}/${CI_PROJECT_PATH}
        fi
      done
    # Logout
    - helm registry logout ${HELM_REGISTRY_URL}
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Release to Private Registry (Traditional)
helm:release:traditional:
  stage: release
  image: alpine:3.19
  dependencies:
    - helm:package
  before_script:
    - apk add --no-cache curl bash git
    - *install_helm
  script:
    # Configure git for chart repository updates
    - git config --global user.email "${GITLAB_USER_EMAIL}"
    - git config --global user.name "${GITLAB_USER_NAME}"
    
    # Clone or update chart repository (if using git-based helm repo)
    - |
      if [ -n "${HELM_REPO_URL}" ]; then
        git clone ${HELM_REPO_URL} chart-repo
        cd chart-repo
        
        # Copy packaged charts
        cp ../packages/*.tgz .
        cp ../packages/index.yaml .
        
        # Commit and push
        git add .
        git commit -m "Release ${CHART_NAME} version ${CHART_VERSION}" || true
        git push origin main
      fi
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  when: manual

# Deploy to staging environment
deploy:staging:
  stage: deploy
  image: alpine:3.19
  dependencies:
    - helm:package
  before_script:
    - apk add --no-cache curl bash
    - *install_helm
    - *install_kubectl
  script:
    # Configure kubectl for staging cluster
    - echo "${KUBE_CONFIG_STAGING}" | base64 -d > ~/.kube/config
    - kubectl config current-context
    
    # Deploy chart to staging
    - |
      helm upgrade --install ${CHART_NAME}-staging ./packages/${CHART_NAME}-${CHART_VERSION}.tgz \
        --namespace fossology-staging \
        --create-namespace \
        --values examples/basic-deployment.yaml \
        --wait \
        --timeout 10m
    
    # Verify deployment
    - kubectl get pods -n fossology-staging
    - kubectl get services -n fossology-staging
  environment:
    name: staging
    url: https://fossology-staging.example.com
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  when: manual

# Deploy to production environment
deploy:production:
  stage: deploy
  image: alpine:3.19
  dependencies:
    - helm:package
  before_script:
    - apk add --no-cache curl bash
    - *install_helm
    - *install_kubectl
  script:
    # Configure kubectl for production cluster
    - echo "${KUBE_CONFIG_PRODUCTION}" | base64 -d > ~/.kube/config
    - kubectl config current-context
    
    # Deploy chart to production
    - |
      helm upgrade --install ${CHART_NAME} ./packages/${CHART_NAME}-${CHART_VERSION}.tgz \
        --namespace fossology \
        --create-namespace \
        --values examples/production-cnpg.yaml \
        --wait \
        --timeout 15m
    
    # Verify deployment
    - kubectl get pods -n fossology
    - kubectl get services -n fossology
  environment:
    name: production
    url: https://fossology.example.com
  rules:
    - if: $CI_COMMIT_TAG
  when: manual

# Cleanup job
cleanup:
  stage: .post
  image: alpine:3.19
  script:
    - echo "Cleaning up temporary files..."
    - rm -rf packages/ || true
    - rm -rf chart-repo/ || true
  when: always
  allow_failure: true

# Release notes generation
release:notes:
  stage: release
  image: alpine:3.19
  before_script:
    - apk add --no-cache git
  script:
    # Generate release notes from CHANGELOG.md
    - |
      if [ -f "CHANGELOG.md" ]; then
        echo "Generating release notes from CHANGELOG.md"
        # Extract current version changes
        sed -n "/## \[${CHART_VERSION}\]/,/## \[/p" CHANGELOG.md | head -n -1 > release-notes.md
      else
        echo "Release ${CHART_NAME} version ${CHART_VERSION}" > release-notes.md
        echo "" >> release-notes.md
        echo "Automated release from commit ${CI_COMMIT_SHA}" >> release-notes.md
      fi
  artifacts:
    paths:
      - release-notes.md
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG