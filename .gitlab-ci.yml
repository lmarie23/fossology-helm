# GitLab CI/CD Pipeline for FOSSology Helm Chart
# Uses to-be-continuous template for Helm chart validation, packaging, and deployment

include:
  # Security scanning templates
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  
  # to-be-continuous Helm template
  - component: "$CI_SERVER_FQDN/to-be-continuous/helm/gitlab-ci-helm@9.2.3"
    inputs:
      # Base application configuration
      base-app-name: "fossology"
      
      # Chart configuration
      chart-dir: "."
      common-values: "values.yaml"
      
      # Publishing configuration
      publish-strategy: "auto"
      publish-url: "$HELM_REGISTRY_URL"
      
      # Environment configuration
      review-enabled: false
      staging-enabled: false
      prod-enabled: false