apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fossology.fullname" . }}-scheduler
  labels:
    app.kubernetes.io/name: {{ include "fossology.fullname" . }}-scheduler
    {{- include "fossology.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name:  {{ include "fossology.fullname" . }}-scheduler
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name:  {{ include "fossology.fullname" . }}-scheduler
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:9.6
          command:
            - sh
            - -c
            - |
              until pg_isready -h $FOSSOLOGY_DB_HOST -p {{ .Values.fossology.db_port }} -U $FOSSOLOGY_DB_USER; do
                echo "Waiting for database to be ready..."
                sleep 2
              done
              echo "Database is ready!"
          env:
            - name: FOSSOLOGY_DB_HOST
              {{- if .Values.postgresql.enabled }}
              value: {{ .Values.postgresql.name }}-rw
              {{- else }}
              valueFrom:
                secretKeyRef:
                {{- if .Values.fossology.externalSecret }}
                  name: {{ .Values.fossology.externalSecret }}
                  key: db_host
                {{- else }}
                  name: {{ template "fossology.fullname" . }}
                  key: db_host
                {{- end }}
              {{- end }}
            - name: FOSSOLOGY_DB_USER
              valueFrom:
                secretKeyRef:
                {{- if .Values.postgresql.enabled }}
                  name: {{ .Values.postgresql.name }}-app
                  key: username
                {{- else if .Values.fossology.externalSecret }}
                  name: {{ .Values.fossology.externalSecret }}
                  key: db_user
                {{- else }}
                  name: {{ template "fossology.fullname" . }}
                  key: db_user
                {{- end }}
      containers:
        - name: scheduler
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: FOSSOLOGY_DB_HOST
              {{- if .Values.postgresql.enabled }}
              value: {{ .Values.postgresql.name }}-rw
              {{- else }}
              valueFrom:
                secretKeyRef:
                {{- if .Values.fossology.externalSecret }}
                 name: {{ .Values.fossology.externalSecret }}
                 key: db_host
                {{- else }}
                 name: {{ template "fossology.fullname" . }}
                 key: db_host
                {{- end }}
              {{- end }}
            - name: FOSSOLOGY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                {{- if .Values.postgresql.enabled }}
                 name: {{ .Values.postgresql.name }}-app
                 key: password
                {{- else if .Values.fossology.externalSecret }}
                 name: {{ .Values.fossology.externalSecret }}
                 key: db_password
                {{- else }}
                 name: {{ template "fossology.fullname" . }}
                 key: db_password
                {{- end }}
            - name: FOSSOLOGY_DB_NAME
              {{- if .Values.postgresql.enabled }}
              value: {{ .Values.postgresql.database | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                {{- if .Values.fossology.externalSecret }}
                 name: {{ .Values.fossology.externalSecret }}
                 key: db_name
                {{- else }}
                 name: {{ template "fossology.fullname" . }}
                 key: db_name
                {{- end }}
              {{- end }}
            - name: FOSSOLOGY_DB_USER
              valueFrom:
                secretKeyRef:
                {{- if .Values.postgresql.enabled }}
                 name: {{ .Values.postgresql.name }}-app
                 key: username
                {{- else if .Values.fossology.externalSecret }}
                 name: {{ .Values.fossology.externalSecret }}
                 key: db_user
                {{- else }}
                 name: {{ template "fossology.fullname" . }}
                 key: db_user
                {{- end }}
          ports:
            - name: scheduler
              containerPort: 80
              protocol: TCP
          command:
             - "/fossology/docker-entrypoint.sh"
             - "scheduler"
          livenessProbe:
            tcpSocket:
              port: scheduler
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: scheduler
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - mountPath: /srv/fossology/repository/
              name: cache-volume
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: cache-volume
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (include "fossology.fullname" .) }}
          {{- else }}
          emptyDir: {}
          {{ end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
